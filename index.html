<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <meta name="description" content="JSON-driven portfolio website." />
  <meta name="author" content="Portfolio" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <!-- App -->
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <!-- ============ NAV ============ -->
  <header class="site-header">
    <nav class="nav" aria-label="Primary">
      <a id="nav-brand" class="nav-brand mono" href="#home">Alex.Morgan</a>

      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav-menu">
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
      </button>

      <ul id="nav-menu" class="nav-menu"></ul>
    </nav>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <!-- signature bus-line spine (desktop only) -->
    <div class="spine" aria-hidden="true"></div>

    <!-- ---------- HERO ---------- -->
    <section id="home" class="section hero" aria-labelledby="hero-name">
      <span class="spine-node" data-node="home" aria-hidden="true"></span>
      <h1 id="hero-name" class="sr-only">Portfolio</h1>
      <div class="hero-grid">
        <div class="hero-copy">
          <p id="hero-eyebrow" class="eyebrow mono">// AI + DATA ENGINEER</p>
          <div class="terminal--hero" aria-hidden="true">
            <div class="terminal-bar">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
              <span class="terminal-label mono">user@portfolio: ~</span>
            </div>
            <div id="hero-terminal" class="terminal-body mono"></div>
          </div>
          <div id="hero-cta" class="hero-cta"></div>
          <div id="hero-social" class="hero-social"></div>
        </div>
        <div class="hero-canvas-wrap">
          <canvas id="dataflow" aria-hidden="true"></canvas>
        </div>
      </div>
    </section>

    <!-- ---------- ABOUT ---------- -->
    <section id="about" class="section" aria-labelledby="about-title">
      <span class="spine-node" data-node="about" aria-hidden="true"></span>
      <p class="eyebrow mono">// about</p>
      <h2 id="about-title" class="section-title">About</h2>
      <div class="about-grid">
        <div id="about-content" class="about-content"></div>
        <figure class="about-portrait">
          <img src="assets/img/portrait.png" alt="Portrait" loading="lazy">
          <figcaption class="mono">Portfolio</figcaption>
        </figure>
      </div>
    </section>

    <!-- ---------- EXPERIENCE ---------- -->
    <section id="experience" class="section" aria-labelledby="experience-title">
      <span class="spine-node" data-node="experience" aria-hidden="true"></span>
      <p class="eyebrow mono">// experience</p>
      <h2 id="experience-title" class="section-title">Experience</h2>
      <div id="experience-list" class="experience-list"></div>
    </section>

    <!-- ---------- PROJECTS ---------- -->
    <section id="work" class="section" aria-labelledby="work-title">
      <span class="spine-node" data-node="work" aria-hidden="true"></span>
      <p class="eyebrow mono">// selected work</p>
      <h2 id="work-title" class="section-title">Projects</h2>
      <div id="work-filters" class="work-filters" role="group" aria-label="Filter projects by category"></div>
      <div id="work-grid" class="work-grid"></div>
    </section>

    <!-- ---------- SKILLS ---------- -->
    <section id="skills" class="section" aria-labelledby="skills-title">
      <span class="spine-node" data-node="skills" aria-hidden="true"></span>
      <p class="eyebrow mono">// stack</p>
      <h2 id="skills-title" class="section-title">Skills</h2>
      <div id="skills-grid" class="skills-grid"></div>
    </section>

    <!-- ---------- EDUCATION ---------- -->
    <section id="education" class="section" aria-labelledby="education-title">
      <span class="spine-node" data-node="education" aria-hidden="true"></span>
      <p class="eyebrow mono">// education</p>
      <h2 id="education-title" class="section-title">Education</h2>
      <div id="education-list" class="education-list"></div>
    </section>

    <!-- ---------- CONTACT ---------- -->
    <section id="contact" class="section" aria-labelledby="contact-title">
      <span class="spine-node" data-node="contact" aria-hidden="true"></span>
      <p class="eyebrow mono">// contact</p>
      <h2 id="contact-title" class="section-title">Contact</h2>
      <div class="contact-grid">
        <div class="contact-lead">
          <p id="contact-subtitle" class="contact-subtitle"></p>
          <div id="contact-social" class="contact-social"></div>
        </div>
        <div class="contact-terminal">
          <div class="contact-terminal-bar" aria-hidden="true">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="contact-terminal-label mono">~/connect</span>
          </div>
          <div id="contact-info" class="contact-info"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p id="footer-text" class="footer-text mono"></p>
      <p id="footer-copyright" class="footer-copyright mono"></p>
      <div id="footer-links" class="footer-links mono"></div>
    </div>
  </footer>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <i class="fas fa-arrow-up" aria-hidden="true"></i>
  </button>
</body>
</html>
